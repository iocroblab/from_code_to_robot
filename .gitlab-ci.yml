stages:
  - deploy

pages:
  stage: deploy
  image: python:3.13-slim
  script:
    - pip install --no-cache-dir mkdocs mkdocs-material mkdocs-material-extensions mkdocs-static-i18n python-markdown-math
    - mkdocs build --site-dir public
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - ~/.cache/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "Public"

